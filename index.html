<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: 12px max(20px, env(safe-area-inset-right)) 60px max(20px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 900px;
  margin: 0 auto;
}

/* ===== Page title ===== */
.dash-title {
  margin: 0 0 20px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; margin-bottom: 14px; } }

/* ===== Bento grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

/* ===== Tile base ===== */
.tile {
  --accent: #FAFAFA;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px 20px 16px;
  background: rgba(255, 255, 255, 0.035);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  text-decoration: none;
  color: var(--text-primary);
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4),
              0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
}
.tile:active { transform: translateY(-1px); }

/* subtle shimmer on the glass */
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  border-radius: inherit;
  pointer-events: none;
}

/* ===== Size variants ===== */
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* ===== Tile anatomy ===== */
.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  line-height: 1;
}
.tile-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.tile-emoji {
  font-size: 28px;
  line-height: 1;
  filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent) 55%, transparent));
}
.tile.big .tile-emoji { font-size: 38px; }
.tile-spacer { flex: 1; }
.tile-name {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.15;
  margin-bottom: 4px;
}
.tile.big .tile-name { font-size: 24px; }
.tile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}
.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  line-height: 1.3;
  flex: 1;
  min-width: 0;
  padding-right: 8px;
}
.tile.big .tile-sub { font-size: 13px; }
.tile-arrow {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  transition: transform 0.18s ease;
  flex-shrink: 0;
  line-height: 1;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
    gap: 12px;
  }
  .tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento {
    grid-template-columns: 1fr;
    grid-auto-rows: 130px;
    gap: 10px;
  }
  .tile.big, .tile.wide { grid-column: span 1; grid-row: span 1; }
  .tile-name { font-size: 16px; }
  .tile.big .tile-name { font-size: 16px; }
  .tile-emoji { font-size: 24px; }
  .tile.big .tile-emoji { font-size: 24px; }
  body { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>
  <div class="bento">

    <!-- ·01 Main — big -->
    <a href="main.html" class="tile big" style="--accent:#6BE3A4">
      <div class="tile-top">
        <span class="tile-num">·01</span>
        <span class="tile-emoji">🏠</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-name">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — wide -->
    <a href="gym.html" class="tile wide" style="--accent:#7DD3FC">
      <div class="tile-top">
        <span class="tile-num">·02</span>
        <span class="tile-emoji">💪</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-name">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health — small -->
    <a href="health.html" class="tile" style="--accent:#A7F3D0">
      <div class="tile-top">
        <span class="tile-num">·03</span>
        <span class="tile-emoji">💊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-name">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Water — small -->
    <a href="po-water.html" class="tile" style="--accent:#60A5FA">
      <div class="tile-top">
        <span class="tile-num">·04</span>
        <span class="tile-emoji">💧</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-name">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Finance — wide -->
    <a href="finance.html" class="tile wide" style="--accent:#F2C063">
      <div class="tile-top">
        <span class="tile-num">·05</span>
        <span class="tile-emoji">📊</span>
      </div>
      <div class="tile-spacer"></div>
      <div class="tile-name">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
