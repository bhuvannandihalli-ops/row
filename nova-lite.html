<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060c">
<title>Nova Lite · AI Mentor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js" defer></script>
<script src="voice.js" defer></script>
<!-- ============================================================
 * NOVA LITE — a simple, drop-in AI mentor for ANY dashboard.
 * Single self-contained file. No backend, no build step.
 *
 * HOW IT WORKS (bring-your-own-key):
 *   • The viewer pastes their OWN Anthropic API key (stored only in
 *     their browser's localStorage — never sent anywhere but Anthropic).
 *   • Nova reads whatever the dashboard saved in localStorage for context.
 *   • Calls the Claude API directly from the browser using the
 *     `anthropic-dangerous-direct-browser-access` header.
 *
 * This is the lightweight version: a flat CSS orb (no 3D), basic chat.
 * The premium build (3D avatar, Spark voice scheduler, secure server
 * proxy, palettes) is the paid Patreon episode.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #6EE7B7; --accent-2: #67E8F9; --bg: #060a1c; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); --orb-hi: #eafff6; --orb-dk: #1f8f66; --orb-eye: #06281d; }
html, body { background: var(--bg); }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px max(18px, env(safe-area-inset-right)) 60px max(18px, env(safe-area-inset-left)); }
.top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 20px; }
.top-right { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
.key-toggle { border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 6px 9px; cursor: pointer; font-size: 13px; line-height: 1; opacity: .55; transition: opacity .15s; }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

/* ---- flat CSS orb avatar (lightweight, no Three.js) ---- */
.orb { width: 60px; height: 60px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, var(--orb-hi), var(--accent) 42%, var(--orb-dk) 100%);
  box-shadow: 0 0 22px -2px var(--accent), inset 0 -6px 14px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before, .orb::after { content: ''; position: absolute; top: 38%; width: 9px; height: 9px; border-radius: 50%;
  background: var(--orb-eye); box-shadow: 0 0 6px rgba(0,0,0,.4); transition: height .15s; }
.orb::before { left: 30%; } .orb::after { right: 30%; }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
.orb.happy::before, .orb.happy::after { height: 4px; border-radius: 0 0 9px 9px; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 22px -2px var(--accent) } 50% { box-shadow: 0 0 34px 2px var(--accent) } }

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* ---- key setup ---- */
.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

/* ---- chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.quick-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.quick-btn { font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 99px; border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--fg); cursor: pointer; transition: all .15s; }
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }

.composer { display: flex; gap: 7px; }
.composer input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 8px 12px; font-size: 13px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 38px; border: 0; border-radius: 10px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 15px; }
.composer button:active { transform: scale(.94); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title"><h1>Nova Lite</h1><div class="role">your mentor</div></div>
      <div class="top-right">
        <div class="orb" id="orb"></div>
        <div style="display:flex;gap:6px;">
          <button class="key-toggle" title="Customise avatar" onclick="location.href='nova-lab.html'">🎨</button>
          <button id="keyToggle" class="key-toggle" aria-label="API key settings" title="API key">🔑</button>
        </div>
      </div>
    </div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Save</button>
      </div>
      <div class="hint" id="hint">
        Your key is stored only in <b>this browser</b> and sent straight to Anthropic — never to us.
        Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="quick-actions">
      <button class="quick-btn" id="overviewBtn">📊 Overview</button>
    </div>

    <div class="composer">
      <input id="chatInput" placeholder="ask Nova…" autocomplete="off" />
      <button id="send" aria-label="Send">→</button>
    </div>
  </div>

<script>
(function(){
  // Apply saved Nova palette on load
  const _PAL = {
    mint:   { accent: '#6EE7B7', accent2: '#67E8F9', orbHi: '#eafff6', orbDk: '#1f8f66', orbEye: '#06281d' },
    violet: { accent: '#A78BFA', accent2: '#C4B5FD', orbHi: '#f0eaff', orbDk: '#4c1d95', orbEye: '#1e0b38' },
    gold:   { accent: '#FBBF24', accent2: '#FCD34D', orbHi: '#fffbe5', orbDk: '#92400e', orbEye: '#2d1300' },
    ocean:  { accent: '#60A5FA', accent2: '#93C5FD', orbHi: '#e0f2fe', orbDk: '#1e40af', orbEye: '#0c1d50' },
    coral:  { accent: '#F97316', accent2: '#FDBA74', orbHi: '#fff3eb', orbDk: '#7c2d12', orbEye: '#2d0d00' },
  };
  (function(){ const p = _PAL[localStorage.getItem('nova_palette') || 'mint'] || _PAL.mint; const r = document.documentElement.style; r.setProperty('--accent', p.accent); r.setProperty('--accent-2', p.accent2); r.setProperty('--orb-hi', p.orbHi); r.setProperty('--orb-dk', p.orbDk); r.setProperty('--orb-eye', p.orbEye); })();

  const KEY_LS = 'nova_lite_api_key';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  // ---- key handling ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  if (savedKey()) { hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.'; keyInput.placeholder = '•••• key saved ••••'; keyToggle.classList.add('has-key'); }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• key saved ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open'); // tuck it away so it's not on screen
  });

  // ---- read whatever the dashboard stored (for context) ----
  function redact(val){
    if (Array.isArray(val)) return val.map(redact);
    if (val && typeof val === 'object'){
      const o = {};
      for (const key in val){
        if (key === 'dataUrl' || key === 'photo' || key === 'image'){ o[key] = '[image omitted]'; continue; }
        o[key] = redact(val[key]);
      }
      return o;
    }
    if (typeof val === 'string' && val.length > 400 && val.indexOf('data:') === 0) return '[large data omitted]';
    return val;
  }
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k === KEY_LS) continue; // never send the key as data
      let val;
      try { val = JSON.parse(localStorage.getItem(k)); } catch(e){ val = localStorage.getItem(k); }
      out[k] = redact(val);
    }
    return out;
  }

  // ---- computed summary: gym training, weight trend, progress photos ----
  function summarizeGym(){
    let weights = [], photos = [], workoutDone = {};
    try { weights = JSON.parse(localStorage.getItem('po_coach_weights') || '[]'); } catch(e){}
    try { photos = JSON.parse(localStorage.getItem('po_coach_photos') || '[]'); } catch(e){}
    try { workoutDone = JSON.parse(localStorage.getItem('po_coach_workout_done') || '{}'); } catch(e){}

    const lines = [];

    if (weights.length){
      const sorted = weights.slice().sort((a,b) => String(a.dateKey).localeCompare(String(b.dateKey)));
      const first = sorted[0], last = sorted[sorted.length - 1];
      const delta = last.weight - first.weight;
      lines.push(`Weight log: ${sorted.length} entries, from ${first.dateKey} (${first.weight}) to ${last.dateKey} (${last.weight}), total change ${delta >= 0 ? '+' : ''}${delta.toFixed(1)}.`);
      const cutoff = Date.now() - 30 * 24 * 3600 * 1000;
      const last30 = sorted.filter(e => new Date(e.dateKey).getTime() >= cutoff);
      if (last30.length >= 2){
        const d30 = last30[last30.length - 1].weight - last30[0].weight;
        lines.push(`Last 30 days: ${d30 >= 0 ? '+' : ''}${d30.toFixed(1)} change.`);
      }
    } else {
      lines.push('Weight log: no entries yet.');
    }

    if (photos.length){
      const sorted = photos.slice().sort((a,b) => String(a.dateKey || '').localeCompare(String(b.dateKey || '')));
      lines.push(`Progress photos: ${photos.length} total, earliest ${sorted[0].dateKey || 'unknown'}, latest ${sorted[sorted.length - 1].dateKey || 'unknown'}.`);
    } else {
      lines.push('Progress photos: none yet.');
    }

    const doneCount = Object.values(workoutDone).filter(Boolean).length;
    lines.push(`Workouts logged as done: ${doneCount}.`);

    return lines.join('\n');
  }

  // ---- render: bullets + **pills** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Nova</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  const SYS =
    "You are Nova, a personal mentor living inside the user's life-tracking dashboard. " +
    "You can see their saved data (food, water, gym, finance, sleep, goals, etc.). " +
    "Pay special attention to gym training, weight tracking, and progress photos when asked about progress or for an overview — use the real numbers below. " +
    "Give honest, specific, encouraging guidance. " +
    "Answer in short bullet points starting with '- ', few words each, plain language. " +
    "Wrap key words and numbers in **double asterisks**. " +
    "End with one '- Do today:' bullet giving the single action.\n\n" +
    "Computed gym/weight/photo summary:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    if (!key){ addCoach('- Paste your **Anthropic API key** above first, then ask me again.'); return; }
    busy = true; addUser(text); input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: SYS + summarizeGym() + "\n\nFull dashboard data as JSON:\n" + JSON.stringify(dashboardData()),
          messages: [{ role: 'user', content: text }],
        }),
      });
      const json = await res.json();
      if (json.error){ loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error.message || 'Something went wrong — check your API key.')); setOrb(''); busy = false; return; }
      const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, no reply.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Could not reach Anthropic — check your connection and key.');
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });
  document.getElementById('overviewBtn').addEventListener('click', () => {
    ask('Give me a full overview of how everything is going — my gym training, weight trend, and progress photos, plus anything else worth flagging. Use real numbers.');
  });

  addCoach('Hey — I am <b>Nova</b>. Paste your key above, then tap <b>Overview</b> for a full read on your gym, weight, and photos — or ask me anything. I keep it short and give you <b>one thing to act on</b>.');
})();
</script>
</body>
</html>
